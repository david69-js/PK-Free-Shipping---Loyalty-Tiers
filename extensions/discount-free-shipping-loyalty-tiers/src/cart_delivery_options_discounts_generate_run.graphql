query Input {
  cart {
    cost {
      subtotalAmount {
        amount
      }
    }
    deliveryGroups {
      id
      deliveryOptions {
        handle
        title
        cost {
          amount
        }
      }
    }
   buyerIdentity {
      customer {
        id
        hasTags(tags: [
          "tier: Defender",
          "tier: Advocate",
          "tier: Activist"
        ]) {
          tag
          hasTag
        }
      }
    }
  }
  discount {
    metafield(namespace: "$app", key: "free-shipping-loyalty-tiers") {
      jsonValue
    }
  }
}